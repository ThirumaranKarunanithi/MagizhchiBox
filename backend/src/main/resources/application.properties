# ============================================================
# Magizhchi Box - Application Configuration
# Copy this file to application-local.properties and fill in
# your actual values. Never commit secrets to version control.
# ============================================================

# Server
server.port=8080
server.error.include-message=always

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/magizhchi_box
spring.datasource.username=postgres
spring.datasource.password=CHANGE_ME
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
# Generate a secure 256-bit (32-byte) base64-encoded secret:
#   openssl rand -base64 32
jwt.secret=CHANGE_ME_USE_OPENSSL_RAND_BASE64_32_OUTPUT
jwt.expiration-ms=604800000

# AWS S3
aws.access-key-id=CHANGE_ME
aws.secret-access-key=CHANGE_ME
aws.region=CHANGE_ME
aws.s3.bucket-name=CHANGE_ME
aws.s3.presigned-url-expiry-minutes=60

# File upload
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# CORS (comma-separated list of allowed origins)
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Storage quota per user (bytes) — default 5 GB
storage.default-quota-bytes=5368709120

# Logging
logging.level.com.magizhchi=DEBUG
logging.level.org.springframework.security=WARN
