# ============================================================
# Magizhchi Box - Application Configuration
# Create application-local.properties alongside this file and
# put your real credentials there (it is git-ignored).
# ============================================================

# Automatically load local overrides if the file exists
spring.config.import=optional:classpath:application-local.properties

# Server — Railway sets $PORT dynamically; fall back to 8080 locally
server.port=${PORT:8080}
server.error.include-message=always

# Database (PostgreSQL) — overridden by SPRING_DATASOURCE_* env vars on Railway
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/magizhchi_box}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT — overridden by JWT_SECRET env var on Railway
jwt.secret=${JWT_SECRET:CHANGE_ME_USE_OPENSSL_RAND_BASE64_32_OUTPUT}
jwt.expiration-ms=604800000

# AWS S3 — overridden by AWS_* env vars on Railway
aws.access-key-id=${AWS_ACCESS_KEY_ID:CHANGE_ME}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:CHANGE_ME}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:CHANGE_ME}
aws.s3.presigned-url-expiry-minutes=60

# File upload
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# CORS — set CORS_ALLOWED_ORIGINS on Railway to your frontend URL
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://localhost,capacitor://localhost,http://localhost}

# Storage quota per user (bytes) — default 5 GB
storage.default-quota-bytes=5368709120

# Email (OTP) — sent via Resend (https://resend.com)
# Set RESEND_API_KEY in Railway environment variables
resend.api-key=${RESEND_API_KEY:}
mail.from=${MAIL_FROM:no-reply@magizhchi.software}

# Logging
logging.level.com.magizhchi=DEBUG
logging.level.org.springframework.security=WARN
